<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Mens Golf League — Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep:   #0f3d1a;
    --green-mid:    #1a5c2a;
    --green-bright: #2d8a3e;
    --green-light:  #4caf50;
    --gold:         #c9a84c;
    --gold-light:   #f0d080;
    --cream:        #f8f4e8;
    --white:        #ffffff;
    --gray-light:   #f0ede4;
    --gray-mid:     #c8c0a8;
    --text-dark:    #1a1a0e;
    --text-mid:     #3a3a2a;
    --red:          #8b1a1a;
    --orange:       #c97020;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--green-deep);
    font-family: 'DM Sans', sans-serif;
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background texture ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(45,138,62,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(201,168,76,0.08) 0%, transparent 50%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 0 16px 60px;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    padding: 48px 0 32px;
    animation: fadeDown 0.8s ease both;
  }

  .header-flag {
    display: inline-block;
    font-size: 40px;
    margin-bottom: 12px;
    animation: bounce 2s ease-in-out infinite;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 7vw, 42px);
    font-weight: 900;
    color: var(--white);
    line-height: 1.1;
    letter-spacing: -0.5px;
  }

  .header h1 span {
    color: var(--gold);
  }

  .header-sub {
    margin-top: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--gray-mid);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header-divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 18px auto 0;
  }

  /* ── Week filter tabs ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 8px 0 16px;
    scrollbar-width: none;
    animation: fadeUp 0.6s 0.3s ease both;
  }
  .filter-bar::-webkit-scrollbar { display: none; }

  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(255,255,255,0.05);
    color: var(--gray-mid);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--green-deep);
    font-weight: 600;
  }

  /* ── Week cards ── */
  .week-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    margin-bottom: 16px;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .week-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .week-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: linear-gradient(135deg, var(--green-mid), var(--green-bright));
    cursor: pointer;
    user-select: none;
  }

  .week-header.alt {
    background: linear-gradient(135deg, #1e4d28, #2a6e38);
  }

  .week-header.tbd {
    background: linear-gradient(135deg, #5a3800, #8a5800);
  }

  .week-header.position {
    background: linear-gradient(135deg, var(--red), #b02020);
  }

  .week-label {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .week-num {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }

  .week-info {
    display: flex;
    flex-direction: column;
  }

  .week-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--white);
    letter-spacing: 0.5px;
  }

  .week-date {
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .week-toggle {
    font-size: 18px;
    color: rgba(255,255,255,0.5);
    transition: transform 0.3s;
  }
  .week-card.open .week-toggle { transform: rotate(180deg); }

  /* ── Matchups ── */
  .matchups {
    display: none;
    padding: 4px 0;
  }
  .week-card.open .matchups { display: block; }

  .matchup-row {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 12px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    gap: 8px;
    transition: background 0.2s;
  }
  .matchup-row:last-child { border-bottom: none; }
  .matchup-row:hover { background: rgba(255,255,255,0.04); }

  .team-side {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .team-side.right {
    text-align: right;
  }

  .team-num {
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .player-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--white);
    line-height: 1.3;
  }

  .vs-badge {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  /* ── TBD / Position cards ── */
  .tbd-message {
    padding: 20px 18px;
    font-size: 13px;
    color: var(--gold-light);
    font-style: italic;
    text-align: center;
    line-height: 1.6;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 24px 0 8px;
    animation: fadeUp 0.6s 0.5s ease both;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--gray-mid);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    padding: 32px 0 0;
    font-size: 11px;
    color: rgba(255,255,255,0.2);
    letter-spacing: 1px;
  }

  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .week-card:nth-child(1)  { animation-delay: 0.05s; }
  .week-card:nth-child(2)  { animation-delay: 0.10s; }
  .week-card:nth-child(3)  { animation-delay: 0.15s; }
  .week-card:nth-child(4)  { animation-delay: 0.20s; }
  .week-card:nth-child(5)  { animation-delay: 0.25s; }
  .week-card:nth-child(6)  { animation-delay: 0.30s; }
  .week-card:nth-child(7)  { animation-delay: 0.35s; }
  .week-card:nth-child(8)  { animation-delay: 0.40s; }
  .week-card:nth-child(9)  { animation-delay: 0.45s; }
  .week-card:nth-child(10) { animation-delay: 0.50s; }
  .week-card:nth-child(11) { animation-delay: 0.55s; }
  .week-card:nth-child(12) { animation-delay: 0.60s; }
  .week-card:nth-child(13) { animation-delay: 0.65s; }

  /* ── Current week highlight ── */
  .week-card.current-week {
    border-color: var(--gold);
    box-shadow: 0 0 0 1px var(--gold), 0 4px 24px rgba(201,168,76,0.2);
  }
  .current-badge {
    background: var(--gold);
    color: var(--green-deep);
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-flag">⛳</div>
    <h1>2026 Mens<br><span>Golf League</span></h1>
    <p class="header-sub">Wednesday Nights &nbsp;·&nbsp; 16 Weeks</p>
    <div class="header-divider"></div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar" id="filterBar">
    <button class="filter-btn active" onclick="filterWeeks('all', this)">All Weeks</button>
    <button class="filter-btn" onclick="filterWeeks('upcoming', this)">Upcoming</button>
    <button class="filter-btn" onclick="filterWeeks('completed', this)">Completed</button>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green-bright)"></div> Regular Play</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--orange)"></div> TBD by Standings</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div> Position Night</div>
  </div>

  <!-- Schedule -->
  <div id="scheduleContainer"></div>

  <div class="footer">PAR 33 &nbsp;·&nbsp; MAX HANDICAP 18 &nbsp;·&nbsp; 21 PTS PER MATCHUP</div>
</div>

<script>
const players = {
  1:  ["Garrett Larson",   "Riley Schmeidt"],
  2:  ["Arin Boschee",     "Casey Beigh"],
  3:  ["Tyler Krueger",    "Heath Feistner"],
  4:  ["Scott Beekman",    "Wade Powell"],
  5:  ["Jeremy Uecker",    "Payton Uecker"],
  6:  ["Jeff Tiede",       "Soop Baysinger"],
  7:  ["Mark Simonds",     "Mike Simonds"],
  8:  ["Jacob Rosemore",   "Ethan Schmidt"],
  9:  ["Mitch Korbel",     "Brandon Goergen"],
  10: ["Gary Beigh",       "Tim Klaas"],
  11: ["Robert Davis",     "Daylyn Baysinger"],
  12: ["Jim Hegg",         "Brad Selland"],
  13: ["Bud Miller",       "Jeff Poyer"],
  14: ["Wesley Linke",     "Ryan Poyer"],
};

const schedule = [
  { week: 1,  date: "May 13, 2026",    matchups: [[1,9],[2,5],[3,8],[4,12],[6,10],[7,11],[13,14]] },
  { week: 2,  date: "May 20, 2026",    matchups: [[1,2],[3,7],[4,9],[5,13],[6,11],[8,10],[12,14]] },
  { week: 3,  date: "May 27, 2026",    matchups: [[1,11],[2,8],[3,13],[4,6],[5,10],[7,12],[9,14]] },
  { week: 4,  date: "June 3, 2026",    matchups: [[1,8],[2,11],[3,9],[4,10],[5,6],[7,14],[12,13]] },
  { week: 5,  date: "June 10, 2026",   matchups: [[1,4],[2,14],[3,10],[5,7],[6,12],[8,9],[11,13]] },
  { week: 6,  date: "June 17, 2026",   matchups: [[1,13],[2,4],[3,6],[5,9],[7,10],[8,12],[11,14]] },
  { week: 7,  date: "June 24, 2026",   matchups: [[1,10],[2,7],[3,4],[5,12],[6,14],[8,11],[9,13]] },
  { week: 8,  date: "July 1, 2026",    matchups: [[1,6],[2,10],[3,12],[4,5],[7,13],[8,14],[9,11]] },
  { week: 9,  date: "July 8, 2026",    matchups: [[1,3],[2,13],[4,8],[5,11],[6,7],[9,12],[10,14]] },
  { week: 10, date: "July 15, 2026",   matchups: [[1,12],[2,3],[4,7],[5,14],[6,9],[8,13],[10,11]] },
  { week: 11, date: "July 22, 2026",   matchups: [[1,5],[2,9],[3,11],[4,14],[6,13],[7,8],[10,12]] },
  { week: 12, date: "July 29, 2026",   matchups: [[1,14],[2,12],[3,5],[4,11],[6,8],[7,9],[10,13]] },
  { week: 13, date: "August 5, 2026",  matchups: [[1,7],[2,6],[3,14],[4,13],[5,8],[9,10],[11,12]] },
  { week: 14, date: "August 12, 2026", matchups: null, tbd: true },
  { week: 15, date: "August 19, 2026", matchups: null, tbd: true },
  { week: 16, date: "August 26, 2026", matchups: null, position: true },
];

// Detect current week based on today's date
function getCurrentWeek() {
  const today = new Date();
  today.setHours(0,0,0,0);
  const dates = [
    new Date('2026-05-13'), new Date('2026-05-20'), new Date('2026-05-27'),
    new Date('2026-06-03'), new Date('2026-06-10'), new Date('2026-06-17'),
    new Date('2026-06-24'), new Date('2026-07-01'), new Date('2026-07-08'),
    new Date('2026-07-15'), new Date('2026-07-22'), new Date('2026-07-29'),
    new Date('2026-08-05'), new Date('2026-08-12'), new Date('2026-08-19'),
    new Date('2026-08-26'),
  ];
  // A week is completed the day AFTER its Wednesday
  // So show the next Wednesday on or after today as "This Week"
  for (let i = 0; i < dates.length; i++) {
    const dayAfter = new Date(dates[i]);
    dayAfter.setDate(dayAfter.getDate() + 1);
    if (today < dayAfter) return i + 1;
  }
  return null;
}

function buildSchedule(filter) {
  const currentWeek = getCurrentWeek();
  const container = document.getElementById('scheduleContainer');
  container.innerHTML = '';

  schedule.forEach((wk, idx) => {
    const isPast = currentWeek && wk.week < currentWeek;
    const isCurrent = wk.week === currentWeek;

    if (filter === 'upcoming' && isPast) return;
    if (filter === 'completed' && !isPast) return;

    const card = document.createElement('div');
    card.className = 'week-card' + (isCurrent ? ' current-week' : '') + (isCurrent || wk.week === 1 ? ' open' : '');
    card.dataset.week = wk.week;

    let headerClass = 'week-header' + (idx % 2 === 1 ? ' alt' : '') + (wk.tbd ? ' tbd' : '') + (wk.position ? ' position' : '');
    let weekLabel = wk.position ? '⭐ POSITION NIGHT' : `WEEK ${wk.week}`;
    let currentBadge = isCurrent ? '<span class="current-badge">This Week</span>' : '';

    let matchupsHtml = '';
    if (wk.position) {
      matchupsHtml = `<div class="tbd-message">🏆 Final standings determine all matchups.<br>Top teams face off — League Winner crowned tonight!</div>`;
    } else if (wk.tbd) {
      matchupsHtml = `<div class="tbd-message">⏳ Matchups to be determined by season standings after Week 13.<br>(1st vs 2nd · 3rd vs 4th · 5th vs 6th · etc.)</div>`;
    } else {
      matchupsHtml = wk.matchups.map(([a, b]) => {
        const pa = players[a], pb = players[b];
        return `
          <div class="matchup-row">
            <div class="team-side">
              <span class="team-num">Team ${a}</span>
              <span class="player-name">${pa[0]}</span>
              <span class="player-name">${pa[1]}</span>
            </div>
            <div class="vs-badge">VS</div>
            <div class="team-side right">
              <span class="team-num" style="display:block;text-align:right">Team ${b}</span>
              <span class="player-name">${pb[0]}</span>
              <span class="player-name">${pb[1]}</span>
            </div>
          </div>`;
      }).join('');
    }

    card.innerHTML = `
      <div class="${headerClass}" onclick="toggleCard(this)">
        <div class="week-label">
          <div class="week-num">${wk.position ? '16' : wk.week}</div>
          <div class="week-info">
            <div class="week-title">${weekLabel} ${currentBadge}</div>
            <div class="week-date">${wk.date} &nbsp;·&nbsp; Wednesday</div>
          </div>
        </div>
        <div class="week-toggle">▼</div>
      </div>
      <div class="matchups">${matchupsHtml}</div>`;

    container.appendChild(card);
  });
}

function toggleCard(header) {
  const card = header.closest('.week-card');
  card.classList.toggle('open');
}

function filterWeeks(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildSchedule(type);
}

buildSchedule('all');

// Auto-scroll to current week
setTimeout(() => {
  const currentWeek = getCurrentWeek();
  if (currentWeek) {
    const el = document.querySelector(`[data-week="${currentWeek}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}, 400);
</script>
</body>
</html>
